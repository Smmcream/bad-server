name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Build Backend
      run: |
        cd backend
        npm run build

    - name: Start Backend
      run: |
        cd backend
        PORT=80 npm start &
        sleep 10
        curl -v http://localhost/api/auth/csrf-token || true

    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

    - name: Run tests
      run: bash $DIR_TESTS/bin/run.sh