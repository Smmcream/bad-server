name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Create .env
      run: |
        cd backend
        echo "PORT=3000" > .env
        echo "MONGODB_URI=mongodb://localhost:27017/weblarek" >> .env
        echo "JWT_SECRET=test_secret" >> .env
        echo "ADMIN_EMAIL=admin@example.com" >> .env
        cat .env

    - name: Install dependencies
      run: |
        cd backend
        npm install
        npm run build

    - name: Import test data
      run: |
        docker exec -i $(docker ps -q -f name=mongo) mongoimport --db weblarek --collection users --drop --file .dump/weblarek.users.json
        docker exec -i $(docker ps -q -f name=mongo) mongoimport --db weblarek --collection products --drop --file .dump/weblarek.products.json

    - name: Start Backend
      run: |
        cd backend
        npm start &
        sleep 10
        curl http://localhost:3000/api/auth/csrf-token || echo "❌ Бэкенд не запустился"

    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

    - name: Run tests
      run: bash $DIR_TESTS/bin/run.sh