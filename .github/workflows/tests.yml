name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Debug - show repository content
      run: |
        echo "=== Содержимое репозитория ==="
        ls -la
        echo "=== Содержимое backend ==="
        ls -la backend
        echo "=== Содержимое package.json ==="
        cat backend/package.json

    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

    - name: Debug - show tests content
      run: |
        echo "=== Содержимое тестов ==="
        ls -la $DIR_TESTS
        echo "=== run.sh ==="
        cat $DIR_TESTS/bin/run.sh

    - name: Run tests
      run: bash $DIR_TESTS/bin/run.sh