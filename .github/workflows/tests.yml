name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4
      with:
        ref: fix-tests

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Create .env
      run: |
        cd backend
        echo "PORT=80" > .env
        echo "MONGODB_URI=mongodb://mongo:27017/weblarek" >> .env
        echo "JWT_SECRET=test_secret" >> .env
        echo "ADMIN_EMAIL=admin@example.com" >> .env
        echo "NODE_ENV=test" >> .env
        cat .env

    - name: Install dependencies
      run: |
        cd backend
        npm install
        npm run build

    - name: Import test data
      run: |
        docker cp .dump/weblarek.users.json $(docker ps -q -f name=mongo):/tmp/users.json
        docker cp .dump/weblarek.products.json $(docker ps -q -f name=mongo):/tmp/products.json
        docker cp .dump/weblarek.orders.json $(docker ps -q -f name=mongo):/tmp/orders.json
        docker exec -i $(docker ps -q -f name=mongo) mongoimport --db weblarek --collection users --drop --file /tmp/users.json --jsonArray
        docker exec -i $(docker ps -q -f name=mongo) mongoimport --db weblarek --collection products --drop --file /tmp/products.json --jsonArray
        docker exec -i $(docker ps -q -f name=mongo) mongoimport --db weblarek --collection orders --drop --file /tmp/orders.json --jsonArray

    - name: Start Backend on Port 80
      run: |
        cd backend
        PORT=80 npm start &
        sleep 15
        echo "=== ПРОВЕРКА БЭКЕНДА ==="
        curl -v http://127.0.0.1:80/api/auth/csrf-token || echo "❌ CSRF не работает"
        curl -v http://127.0.0.1:80/api/orders || echo "❌ Заказы не доступны"

    - name: Debug - test registration
      run: |
        echo "=== РЕГИСТРАЦИЯ ==="
        curl -v -X POST http://127.0.0.1:80/api/auth/register \
          -H "Content-Type: application/json" \
          -d '{"email":"test@test.com","password":"password","name":"Test"}' \
          || echo "❌ Регистрация не работает"

    - name: Debug - show backend logs
      run: |
        echo "=== ПРОЦЕССЫ NODE ==="
        ps aux | grep node

    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

    - name: Run tests
      env:
        API_URL: "http://127.0.0.1:80"
      run: bash $DIR_TESTS/bin/run.sh