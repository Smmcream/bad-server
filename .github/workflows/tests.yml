name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install dependencies
      run: |
        cd backend
        npm ci
        npm run build

    - name: Start Backend
      run: |
        cd backend
        PORT=80 node dist/app.js &
        sleep 15
        echo "=== ДИАГНОСТИКА ==="
        curl -v http://localhost:80/api/auth/csrf-token || echo "❌ localhost:80 не отвечает"
        curl -v http://127.0.0.1:80/api/auth/csrf-token || echo "❌ 127.0.0.1:80 не отвечает"
        curl -v http://localhost:3000/api/auth/csrf-token || echo "❌ 3000 не отвечает"
        netstat -tulpn | grep 80 || echo "❌ Порт 80 не слушается"
        ps aux | grep node

    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS

    - name: Run tests
      run: bash $DIR_TESTS/bin/run.sh